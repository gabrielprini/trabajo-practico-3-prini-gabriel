<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simpsons API</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body class="d-flex flex-column min-vh-100">
    <header class="bg-warning text-center text-white p-2">
      <h1 class="fw-bold">Simpsons API🍩</h1>
      <h2 class="text-decoration-underline">
        Instituto Politécnico - Saucedo Angel Emanuel <br />
        Trabajo Práctico Integrador - TLP
      </h2>
    </header>
    <main class="container">
      <!-- Buscador  -->
      <section class="search-section mb-4">
        <form id="formBuscar" class="search-form">
          <label for="buscarPj">Buscar personaje por nombre</label>
          <div class="input-group">
            <input
              type="search"
              id="buscarPj"
              class="form-control"
              placeholder="Ej: Homer, Marge, Bart..."
            />
          </div>
          <button
            type="submit"
            id="btnLimpiar"
            class="btn btn-outline-secondary"
          >
            Limpiar
          </button>
        </form>
      </section>
      <!-- ACÁ VAN A ESTAR LOS MENSAJES DE ERRORES  -->
      <div id="mensajeEstado" class="mb-3"></div>
      <!-- ACÁ VAN A ESTAR LAS CARTAS QUE VAN A CONTENER LOS PERSONAJES -->
      <div class="row g-3" id="cartaPj"></div>
      <!-- ESTE ES EL MODAL DE BOOSTRAP -->
      <div class="modal fade" id="modalDetalle" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
          <div class="modal-content">
            <div class="modal-header">...</div>
            <div class="modal-body">...</div>
          </div>
        </div>
      </div>
    </main>
    <footer
      class="bg-warning footer mt-auto text-black fw-bold text-center text-muted p-1"
    >
      <p>
        &copy;Saucedo Angel Emanuel <br />
        Instituto Politécnico Formosa
      </p>
    </footer>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="assets/js/app.js"></script>
  </body>
</html>
